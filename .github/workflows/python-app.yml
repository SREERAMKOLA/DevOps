name: CI Pipeline

on:
  push:
   branches: [main]

jobs:
 build:
  runs-on: ubuntu latest

  steps:
    - uses: actions/checkout@v4
    
    - name: setup python
      uses: actions/set-up-python@v5
      with:
       python-version: '3.10'

    - name: Run App
      run: python app.py

    - name: Deploy to Server
      run: echo "Application Deployed"
